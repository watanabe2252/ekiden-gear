<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚡ 駅伝・マラソン機材管理 ＆ リアルタイムクラウド - ログイン</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgDark: '#070a13',
                        cardBg: '#111625',
                        borderStroke: '#1e2538',
                        accentGreen: '#10b981'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bgDark text-slate-100 min-h-screen flex flex-col items-center justify-center p-4 font-sans select-none">

    <div class="max-w-sm w-full bg-cardBg border border-borderStroke p-6 rounded-2xl shadow-2xl space-y-6">
        
        <div class="text-center space-y-2">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-accentGreen/10 border border-accentGreen/30 text-accentGreen text-xl animate-pulse">
                <i class="fas fa-bolt"></i>
            </div>
            <h1 class="text-base font-black tracking-wider text-white">駅伝・マラソン機材管理</h1>
            <p class="text-[10px] text-slate-400 font-mono tracking-widest uppercase">Realtime Cloud Synchronization</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-[10px] text-slate-400 mb-1 font-bold tracking-wider uppercase">アクセスキー (PIN)</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-3 top-3.5 text-slate-500 text-xs"></i>
                    <input type="password" id="pinInput" placeholder="••••••••" class="w-full bg-bgDark border border-borderStroke rounded-xl pl-9 pr-4 py-2.5 text-sm text-white font-mono tracking-widest outline-none focus:border-accentGreen transition" onkeypress="if(event.key === 'Enter') handleLogin()">
                </div>
            </div>

            <div id="errorMsg" class="hidden text-[11px] text-rose-400 bg-rose-950/30 border border-rose-500/20 p-2.5 rounded-lg flex items-center gap-1.5 font-bold">
                <i class="fas fa-exclamation-circle shrink-0"></i>
                <span id="errorText">アクセスキーが正しくありません。</span>
            </div>

            <button onclick="handleLogin()" class="w-full bg-accentGreen hover:bg-emerald-600 text-bgDark font-black text-xs py-3 rounded-xl transition active:scale-[0.98] shadow-lg shadow-emerald-950/20 flex items-center justify-center gap-1.5">
                <i class="fas fa-sign-in-alt"></i> システムへ接続
            </button>
        </div>

        <div class="text-center border-t border-borderStroke/60 pt-4">
            <p class="text-[9px] text-slate-600 font-mono">BROADCAST ENGINEERING & LIVE PRODUCTION</p>
        </div>
    </div>

    <script>
        // かんたん認証用のハッシュ/PINチェック（環境に応じて調整してください）
        // ここではデフォルトの管理者PIN、または現場共通PINを設定
        const ADMIN_PIN = "1030"; // 例：大会用暫定PIN

        // 既にセッションがある場合はメイン画面へ自動リダイレクト
        if (localStorage.getItem('ekiden_secure_session')) {
            window.location.href = "index.html";
        }

        function handleLogin() {
            const pin = document.getElementById('pinInput').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');

            if (!pin) {
                errorText.innerText = "アクセスキーを入力してください。";
                errorMsg.classList.remove('hidden');
                return;
            }

            // PINコードの判定（現場運用に合わせて役割を決定）
            if (pin === ADMIN_PIN || pin === "broadcast2026") {
                // セッションを保存
                localStorage.setItem('ekiden_secure_session', 'true');
                localStorage.setItem('ekiden_user_role', 'admin'); // 管理者権限
                
                errorMsg.classList.add('hidden');
                window.location.href = "index.html"; // メインアプリへ
            } else if (pin === "viewer") {
                // 閲覧専用権限でのログイン
                localStorage.setItem('ekiden_secure_session', 'true');
                localStorage.setItem('ekiden_user_role', 'viewer'); 
                
                errorMsg.classList.add('hidden');
                window.location.href = "index.html";
            } else {
                errorText.innerText = "アクセスキーが正しくないか、有効期限が切れています。";
                errorMsg.classList.remove('hidden');
                // 入力をクリア
                document.getElementById('pinInput').value = "";
                document.getElementById('pinInput').focus();
            }
        }
    </script>
</body>
</html>
