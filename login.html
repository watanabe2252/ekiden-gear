<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ログイン ⚡ 駅伝・マラソン機材管理</title>
    
    <!-- 📦 iOS PWA 全画面表示のための必須設定（index.htmlと完全に一致させる） -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="駅伝機材管理">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">

    <!-- Tailwind CSS & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgDark: '#070a13',
                        cardBg: '#111625',
                        borderStroke: '#1e2538',
                        accentGreen: '#10b981'
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            padding-top: env(safe-area-inset-top, 20px);
            padding-bottom: env(safe-area-inset-bottom, 20px);
            height: 100dvh;
        }
    </style>
</head>
<body class="bg-bgDark text-slate-100 font-sans flex flex-col items-center justify-center p-4 select-none">

    <!-- 🔐 ログインカード領域 -->
    <div class="max-w-md w-full bg-cardBg border border-borderStroke p-6 rounded-2xl shadow-2xl space-y-6 text-center">
        
        <!-- ロゴ・タイトル -->
        <div class="space-y-1.5">
            <div class="text-accentGreen text-4xl animate-pulse">
                <i class="fas fa-bolt"></i>
            </div>
            <h1 class="text-base font-black tracking-wider text-white uppercase">
                駅伝・マラソン機材管理
            </h1>
            <p class="text-[10px] text-slate-400 font-mono tracking-widest uppercase">
                SECURE IDENTITY PORTAL
            </p>
        </div>

        <!-- フォーム領域 -->
        <div class="space-y-4 text-left text-xs">
            <div>
                <label class="block text-[10px] text-slate-400 mb-1 font-bold uppercase tracking-wider">アクセスパスコード</label>
                <div class="relative flex items-center">
                    <i class="fas fa-lock absolute left-3 text-slate-500"></i>
                    <input type="password" id="passcodeField" placeholder="••••••••" 
                           class="w-full bg-bgDark border border-borderStroke rounded-xl pl-9 pr-3 py-3 text-white outline-none focus:border-accentGreen font-mono tracking-widest"
                           onkeypress="if(event.key === 'Enter') executeLogin()">
                </div>
            </div>

            <div>
                <label class="block text-[10px] text-slate-400 mb-1 font-bold uppercase tracking-wider">操作権限（ロール）</label>
                <div class="relative flex items-center">
                    <i class="fas fa-user-shield absolute left-3 text-slate-500"></i>
                    <select id="roleField" class="w-full bg-bgDark border border-borderStroke rounded-xl pl-9 pr-3 py-3 text-white outline-none focus:border-accentGreen font-bold cursor-pointer appearance-none">
                        <option value="viewer">👀 閲覧者 (VIEWER)</option>
                        <option value="staff">🏃 現場スタッフ (STAFF)</option>
                        <option value="admin">🛠️ 総括管理者 (ADMIN)</option>
                    </select>
                    <i class="fas fa-chevron-down absolute right-3 text-slate-500 pointer-events-none"></i>
                </div>
            </div>
        </div>

        <!-- ログインボタン -->
        <button onclick="executeLogin()" class="w-full bg-accentGreen hover:bg-emerald-600 text-bgDark font-black text-sm py-3 rounded-xl transition shadow-lg active:scale-[0.98] flex items-center justify-center gap-2">
            <i class="fas fa-sign-in-alt"></i> システムに接続
        </button>

        <div id="loginAlert" class="hidden text-[10px] text-rose-400 font-bold bg-rose-950/20 border border-rose-500/30 p-2.5 rounded-xl">
            ❌ パスコードが正しくありません。
        </div>

    </div>

    <!-- 📋 コピーライト表記 -->
    <p class="absolute bottom-4 text-[9px] text-slate-600 font-mono tracking-widest uppercase">
        &copy; 2026 EKIDEN REALTIME CLOUD
    </p>

    <script>
        // 🔐 簡易認証ロジック (既存の仕様に合わせて適宜パスコードは調整してください)
        function executeLogin() {
            const passcode = document.getElementById('passcodeField').value.trim();
            const role = document.getElementById('roleField').value;
            const alertBox = document.getElementById('loginAlert');

            if (!passcode) {
                alert("パスコードを入力してください。");
                return;
            }

            // 仮の簡易パスコード判定（お使いの運用ルールに書き換えてください）
            // 例: 何か入力されていればセッションを作る、または特定の文字列
            if (passcode === "ekiden2026" || passcode !== "") { 
                if (alertBox) alertBox.classList.add('hidden');
                
                // セッションと権限をストレージに書き込み
                localStorage.setItem('ekiden_secure_session', 'true_' + Date.now());
                localStorage.setItem('ekiden_user_role', role);
                
                // メイン画面（index.html）へ安全にジャンプ
                window.location.href = "index.html";
            } else {
                if (alertBox) alertBox.classList.remove('hidden');
            }
        }

        // すでにセッションがある場合はログインをスキップして index.html へ
        document.addEventListener("DOMContentLoaded", () => {
            if (localStorage.getItem('ekiden_secure_session')) {
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
