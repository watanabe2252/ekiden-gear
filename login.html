<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚡ ログイン | 駅伝・マラソン機材管理システム</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgDark: '#070a13',
                        cardBg: '#111625',
                        borderStroke: '#1e2538',
                        accentGreen: '#10b981'
                    }
                }
            }
        }
    </script>
    
    <style>
        /* 💡 iPhone特有の上下セーフエリア（ノッチや底面バー）による押し潰れ・型崩れを防ぐための調整 */
        body {
            /* 画面上部のステータスバーやノッチ分の余白を自動確保 */
            padding-top: env(safe-area-inset-top, 20px);
            /* 画面下部のホームインジケーター分の余白を自動確保 */
            padding-bottom: env(safe-area-inset-bottom, 20px);
            /* 高さの基準を動的ビューポート（dvh）にしてキーボード表示時の崩れも防止 */
            min-height: 100dvh;
        }
    </style>
</head>
<body class="bg-bgDark text-slate-100 flex flex-col items-center justify-center p-6 font-sans select-none overflow-x-hidden">

    <div class="w-full max-w-sm bg-cardBg border border-borderStroke p-6 rounded-2xl shadow-2xl space-y-6 my-auto">
        
        <div class="text-center space-y-1">
            <h1 class="text-xl font-black text-white flex items-center justify-center gap-2">
                <span class="text-accentGreen">⚡</span> 駅伝機材管理システム
            </h1>
            <p class="text-[10px] text-slate-500 font-mono tracking-widest uppercase">Cloud Synchronization System</p>
        </div>

        <div class="space-y-4 text-xs">
            <div>
                <label class="block text-[10px] text-slate-400 mb-1 font-bold uppercase tracking-wider">ユーザーID / User ID</label>
                <div class="relative flex items-center w-full">
                    <i class="fas fa-user absolute left-4 text-slate-500 pointer-events-none z-10 text-sm"></i>
                    <input type="text" id="loginId" placeholder="ユーザーIDを入力" class="w-full bg-bgDark border border-borderStroke rounded-xl pl-11 pr-4 py-3 text-white outline-none focus:border-accentGreen font-sans placeholder-slate-600 block transition-all">
                </div>
            </div>

            <div>
                <label class="block text-[10px] text-slate-400 mb-1 font-bold uppercase tracking-wider">パスワード / Password</label>
                <div class="relative flex items-center w-full">
                    <i class="fas fa-lock absolute left-4 text-slate-500 pointer-events-none z-10 text-sm"></i>
                    <input type="password" id="loginPassword" placeholder="••••••••" class="w-full bg-bgDark border border-borderStroke rounded-xl pl-11 pr-4 py-3 text-white outline-none focus:border-accentGreen font-mono placeholder-slate-600 block transition-all" onkeypress="if(event.key === 'Enter') handleLogin()">
                </div>
            </div>

            <div id="errorMessage" class="hidden text-rose-400 text-[11px] font-bold bg-rose-950/20 border border-rose-500/30 p-2.5 rounded-xl text-center">
                <i class="fas fa-exclamation-circle mr-1"></i> <span id="errorText"></span>
            </div>

            <button onclick="handleLogin()" id="btnLogin" class="w-full bg-accentGreen hover:bg-emerald-600 text-bgDark font-black text-sm py-3 rounded-xl transition active:scale-[0.98] shadow-lg flex items-center justify-center gap-2 mt-2">
                <i class="fas fa-sign-in-alt"></i> <span>システムへ接続</span>
            </button>
        </div>

        <div class="text-center border-t border-borderStroke/60 pt-3">
            <p class="text-[9px] text-slate-600 font-mono">&copy; 2026 Broadcast Engineering Team.</p>
        </div>
    </div>

    <div id="loadingOverlay" class="fixed inset-0 bg-bgDark/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center gap-2 hidden">
        <div class="animate-spin text-accentGreen text-3xl"><i class="fas fa-circle-notch"></i></div>
        <p class="text-[10px] text-slate-400 font-mono tracking-widest">AUTHENTICATING SECURE SESSION...</p>
    </div>

    <script>
        const SUPABASE_URL = "https://sqenqerjzgxvtogtjfij.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNxZW5xZXJqemd4dnRvZ3RqZmlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzOTEyNzMsImV4cCI6MjA5Nzk2NzI3M30.8Y6vhpdnLL3B9_HySsCZ1wbzA4Jkjl0chqB5RD3iLOg";
        
        const sb = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

        window.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('ekiden_secure_session')) {
                window.location.href = "index.html";
            }
        });

        async function handleLogin() {
            if (!sb) return;

            const inputId = document.getElementById('loginId').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const errorBox = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const loading = document.getElementById('loadingOverlay');

            if (!inputId || !password) {
                errorText.innerText = "ユーザーIDとパスワードを入力してください。";
                errorBox.classList.remove('hidden');
                return;
            }

            errorBox.classList.add('hidden');
            loading.classList.remove('hidden');

            try {
                const { data, error } = await sb.auth.signInWithPassword({
                    email: inputId,
                    password: password
                });

                if (error) throw error;

                if (data && data.session) {
                    localStorage.setItem('ekiden_secure_session', data.session.access_token);
                    
                    let userRole = "admin"; 
                    if (inputId.toLowerCase().includes('viewer')) {
                        userRole = "viewer";
                    } else if (inputId.toLowerCase().includes('staff')) {
                        userRole = "staff";
                    }
                    localStorage.setItem('ekiden_user_role', userRole);

                    window.location.href = "index.html";
                } else {
                    throw new Error("セッションの確立に失敗しました。");
                }

            } catch (err) {
                console.error("Login Error:", err);
                errorText.innerText = "ユーザーIDまたはパスワードが正しくありません。";
                errorBox.classList.remove('hidden');
            } finally {
                loading.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
