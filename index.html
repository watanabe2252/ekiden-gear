    <script>
        // ==========================================
        // 🔄 iOS PWA 特有の無限リロード・デッドロック防止ガード
        // ==========================================
        (function() {
            const sessionKey = 'ekiden_secure_session';
            
            // URLパラメータに強制リセットがある場合はクリア
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('loop_reset')) {
                localStorage.removeItem(sessionKey);
                window.location.href = "login.html";
                return;
            }

            // セッションチェック
            if (!localStorage.getItem(sessionKey)) {
                const now = Date.now();
                const lastRedirect = sessionStorage.getItem('last_auth_redirect') || 0;
                
                // 2.5秒以内に連続してここを通過した場合は無限ループとみなし、強制的に止めてloginへ
                if (now - lastRedirect < 2500) {
                    sessionStorage.setItem('last_auth_redirect', now);
                    // 画面のパースとレンダリングの競合を防ぐため非同期で遷移
                    setTimeout(() => {
                        window.location.href = "login.html?error=loop_prevented";
                    }, 100);
                } else {
                    sessionStorage.setItem('last_auth_redirect', now);
                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 50);
                }
                // ループ中の不要なDOMレンダリングをストップさせる
                window.stop();
            } else {
                console.log("認証セッション確認完了");
            }
        })();

    </script>

                    <button onclick="addLocationPoint()" class="bg-yellow-500 hover:bg-yellow-600 text-bgDark font-black text-[10px] px-3 py-2 rounded-lg transition active:scale-[0.95] shrink-0 whitespace-nowrap">
                        📍 配置先追加

            <div class="flex-1 overflow-y-auto w-full pb-28">

        <div id="pageBBS" class="flex-1 flex flex-col overflow-hidden space-y-2 hidden">

                    <h3 id="bbsFormTitle" class="text-[11px] font-bold text-accentGreen uppercase tracking-wider flex items-center gap-1.5 whitespace-nowrap">

                    </h3>
                    <button id="btnCancelEdit" onclick="cancelBBSEdit()" class="hidden text-[10px] bg-slate-800 hover:bg-slate-700 text-slate-300 px-2 py-0.5 rounded border border-slate-700 whitespace-nowrap">キャンセル</button>
                </div>
                <div class="flex flex-col sm:flex-row gap-2">

                    <input type="text" id="msgBody" placeholder="連絡事項を入力..." class="flex-1 bg-bgDark border border-borderStroke rounded-lg p-1.5 text-xs text-white outline-none focus:border-accentGreen" onkeypress="if(event.key === 'Enter') sendBBSMessage()">
                    <button id="btnBBSSubmit" onclick="sendBBSMessage()" class="bg-accentGreen hover:bg-emerald-600 text-bgDark font-black text-xs px-4 py-1.5 rounded-lg transition active:scale-[0.95] shrink-0">送信</button>
                </div>

            <div class="bg-cardBg border border-borderStroke rounded-xl shadow-xl flex-1 overflow-hidden flex flex-col">
                <div id="bbsTimeline" class="p-3 overflow-y-auto flex-1 space-y-2 pb-28"></div>
            </div>

        <div id="pageRegister" class="max-w-xl mx-auto w-full space-y-4 hidden pb-28 overflow-y-auto">
            <div class="bg-cardBg border border-borderStroke p-4 rounded-xl space-y-3">
                <h3 class="text-xs font-bold text-accentGreen uppercase tracking-wider flex items-center gap-1.5"><i class="fas fa-plus-circle"></i> 新規機材の登録</h3>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-0.5 font-bold">機材名 *</label>
                        <input type="text" id="addName" placeholder="例: デジタル無線機A" class="w-full bg-bgDark border border-borderStroke rounded-lg p-1.5 text-xs text-white outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-0.5 font-bold">機材ID *</label>
                        <input type="text" id="addId" placeholder="例: W-01" class="w-full bg-bgDark border border-borderStroke rounded-lg p-1.5 text-xs text-white outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-0.5 font-bold">カテゴリー *</label>
                        <input type="text" id="addCat" placeholder="例: 無線機" class="w-full bg-bgDark border border-borderStroke rounded-lg p-1.5 text-xs text-white outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-0.5 font-bold">配置ポイント</label>
                        <select id="addLoc" class="w-full bg-bgDark border border-borderStroke rounded-lg p-1.5 text-xs text-white outline-none"></select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-0.5 font-bold">機材番号</label>
                        <input type="text" id="addNum" placeholder="例: No.1" class="w-full bg-bgDark border border-borderStroke rounded-lg p-1.5 text-xs text-white outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-0.5 font-bold">メーカー名</label>
                        <input type="text" id="addMfr" placeholder="例: ICOM" class="w-full bg-bgDark border border-borderStroke rounded-lg p-1.5 text-xs text-white outline-none">
                    </div>
                </div>
                <button onclick="addGear()" class="w-full bg-accentGreen text-bgDark font-black text-xs py-2 rounded-lg transition active:scale-[0.95]">マスターに追加 ＆ 大会へアサイン</button>
            </div>
            
            <div class="bg-cardBg border border-borderStroke p-4 rounded-xl space-y-2">
                <h3 class="text-xs font-bold text-blue-400 uppercase tracking-wider flex items-center gap-1.5"><i class="fas fa-link"></i> 既存マスター機材のアサイン</h3>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-0.5 font-bold">アサインする機材ID</label>
                        <input type="text" id="assignGearId" placeholder="例: W-01" class="w-full bg-bgDark border border-borderStroke rounded-lg p-1.5 text-xs text-white outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-0.5 font-bold">配置先</label>
                        <select id="assignLoc" class="w-full bg-bgDark border border-borderStroke rounded-lg p-1.5 text-xs text-white outline-none"></select>
                    </div>
                </div>
                <button onclick="assignExistingGear()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-black text-xs py-2 rounded-lg transition active:scale-[0.95]">機材をアサイン追加</button>
            </div>

        <div id="pageMaintenance" class="space-y-2 hidden flex-1 flex flex-col overflow-hidden">
            <div class="bg-cardBg border border-borderStroke p-2 rounded-xl shrink-0">
                <input type="text" id="maintSearchKeyword" oninput="renderMaintenanceTable()" placeholder="機材名、ID、カテゴリーで検索..." class="w-full bg-bgDark border border-borderStroke rounded-lg p-1.5 text-xs text-white outline-none">
            </div>
            <div class="bg-cardBg border border-borderStroke rounded-xl overflow-y-auto flex-1 shadow-xl pb-28">
                <table class="w-full text-left border-collapse table-fixed">
                    <thead>
                        <tr class="bg-slate-900/95 border-b border-borderStroke text-slate-400 text-[10px] font-bold uppercase tracking-wider sticky top-0 z-10">
                            <th class="p-2 w-[25%] whitespace-nowrap">機材ID</th>
                            <th class="p-2 w-[25%] whitespace-nowrap">カテゴリー</th>
                            <th class="p-2 w-[40%] whitespace-nowrap">機材名</th>
                            <th class="p-2 w-[10%] text-right whitespace-nowrap"></th>
                        </tr>
                    </thead>
                    <tbody id="maintTableBody" class="divide-y divide-borderStroke text-xs"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="bottomNavBar" class="fixed bottom-0 inset-x-0 bg-slate-900/95 backdrop-blur-md border-t border-borderStroke z-30 px-2 py-1.5 flex justify-around items-center text-center hidden">
        <button id="navList" onclick="switchTab('list')" class="flex-1 py-1 text-accentGreen flex flex-col items-center gap-0.5">
            <i class="fas fa-layer-group text-base"></i><span class="text-[9px] font-bold">機材配置</span>
        </button>
        <button id="navBBS" onclick="switchTab('bbs')" class="flex-1 py-1 text-slate-400 flex flex-col items-center gap-0.5">
            <i class="fas fa-comments text-base"></i><span class="text-[9px] font-bold">現場掲示板</span>
        </button>
        <button id="navRegister" onclick="switchTab('register')" class="flex-1 py-1 text-slate-400 flex flex-col items-center gap-0.5">
            <i class="fas fa-plus-circle text-base"></i><span class="text-[9px] font-bold">データ登録</span>
        </button>
        <button id="navMaint" onclick="switchTab('maint')" class="flex-1 py-1 text-slate-400 flex flex-col items-center gap-0.5">
            <i class="fas fa-tools text-base"></i><span class="text-[9px] font-bold">管理設定</span>
        </button>
    </div>

    <script>
        globalThis.sb = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
        const defaultLocations = ["no assign"];
        let locations = [...defaultLocations];
        let rawCloudLocations = []; 
        let events = [];
        let currentEventId = null; 
        let currentEventName = "";
        let userRole = "viewer";   
        let gears = [];              
        let bbsMessages = [];
        let currentUploadedUrl = "";
        let dragTargetElement = null;

        function logStatus(msg) {
            console.log(msg);
            const el = document.getElementById('errorDetails');
            if (el) el.innerHTML += `> ${msg}<br>`;
        }

        function showLoading(show, text = "CONNECTING TO SUPABASE...") {
            const screen = document.getElementById('loadingScreen');
            const txt = document.getElementById('loadingText');
            if (!screen) return;
            if (show) {
                if (txt) txt.innerText = text;
                screen.classList.remove('hidden');
            } else {
                screen.classList.add('hidden');
            }
        }

        function forceOpenApp() {
            logStatus("⚠️ タイムアウトによる強制バイパスを実行");
            document.getElementById('loadingScreen')?.classList.add('hidden');
            document.getElementById('pageEventSelect')?.classList.remove('hidden');
        }

        function handleLogout() {
            if(confirm("システムから安全にログアウトしますか？")) {
                localStorage.removeItem('ekiden_secure_session');
                localStorage.removeItem('ekiden_user_role');
                window.location.href = "login.html";
            }
        }

        function switchTab(tab) {
            const tabs = {
                list: document.getElementById('pageList'),
                bbs: document.getElementById('pageBBS'),
                register: document.getElementById('pageRegister'),
                maint: document.getElementById('pageMaintenance')
            };
            const navs = {
                list: document.getElementById('navList'),
                bbs: document.getElementById('navBBS'),
                register: document.getElementById('navRegister'),
                maint: document.getElementById('navMaint')
            };
            
            Object.keys(tabs).forEach(k => {
                if(tabs[k]) tabs[k].classList.add('hidden');
                if(navs[k]) {
                    navs[k].classList.remove('text-accentGreen');
                    navs[k].classList.add('text-slate-400');
                }
            });
            
            if(tabs[tab]) tabs[tab].classList.remove('hidden');
            if(navs[tab]) {
                navs[tab].classList.remove('text-slate-400');
                navs[tab].classList.add('text-accentGreen');
            }
        }

        function updateSelectBoxes() {
            const selectors = ['filterLocation', 'addLoc', 'assignLoc'];
            selectors.forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                const currentVal = el.value;
                
                if (id === 'filterLocation') {
                    el.innerHTML = `<option value="ALL">📍 すべての配置先</option>` + 
                        locations.map(loc => `<option value="${loc}">${loc}</option>`).join('');
                } else {
                    el.innerHTML = locations.map(loc => `<option value="${loc}">${loc}</option>`).join('');
                }
                
                if ([...el.options].some(o => o.value === currentVal)) {
                    el.value = currentVal;
                }
            });
        }

        async function loadEventMenu() {
            if (!globalThis.sb) return;
            userRole = localStorage.getItem('ekiden_user_role') || 'viewer';
            showLoading(true, "🔌 大会リストの同期を開始...");
            
            const diagTimer = setTimeout(() => {
                document.getElementById('errorDiagnostic')?.classList.remove('hidden');
            }, 20000);

            try {
                const { data: eventData, error } = await globalThis.sb.from('events').select('*').order('date', { ascending: false });
                if (error) throw error;
                clearTimeout(diagTimer);
                events = eventData || [];
                
                const container = document.getElementById('eventListContainer');
                if (document.getElementById('lblUserRole')) {
                    document.getElementById('lblUserRole').innerText = userRole.toUpperCase();
                }
                
                if (events.length === 0) {
                    if(container) container.innerHTML = `<div class="text-center text-slate-500 py-6 text-xs">番組ファイルがありません。</div>`;
                    showLoading(false);
                    document.getElementById('pageEventSelect')?.classList.remove('hidden');
                    return;
                }
                const isViewer = (userRole === 'viewer');
                if(container) {
                    container.innerHTML = events.map(ev => `
                        <div class="bg-cardBg border border-borderStroke p-3 rounded-xl flex justify-between items-center transition gap-2">
                            <div onclick="selectEventFile('${ev.id}', '${ev.name}')" class="text-left flex-1 cursor-pointer active:scale-[0.99] min-w-0">
                                <h4 class="text-xs font-bold text-white truncate">📁 ${ev.name}</h4>
                                <p class="text-[9px] text-slate-500 font-mono mt-0.5">開催日: ${ev.date}</p>
                            </div>
                            <div class="flex items-center gap-1.5 shrink-0">
                                ${!isViewer ? `<button onclick="openEditEventModal('${ev.id}')" class="text-[10px] bg-slate-800 text-yellow-500 px-2 py-1 rounded-lg border border-slate-700 font-bold">編集</button>` : ''}
                            </div>
                        </div>
                    `).join('');
                }
                document.getElementById('pageEventSelect')?.classList.remove('hidden');
                showLoading(false);
            } catch (err) {
                logStatus("❌ 大会ロード失敗: " + err.message);
                document.getElementById('errorDiagnostic')?.classList.remove('hidden');
            }
        }

        function openCreateEventModal() {
            const today = new Date().toISOString().split('T')[0];
            if(document.getElementById('newEventDate')) document.getElementById('newEventDate').value = today;
            document.getElementById('createEventModal')?.classList.remove('hidden');
        }
        function closeCreateEventModal() { document.getElementById('createEventModal')?.classList.add('hidden'); }
        
        function openEditEventModal(id) {
            const ev = events.find(e => e.id === id);
            if (!ev) return;
            document.getElementById('editEventTargetId').value = ev.id;
            document.getElementById('editEventIdDisplay').innerText = ev.id;
            document.getElementById('editEventName').value = ev.name || "";
            document.getElementById('editEventDate').value = ev.date || "";
            document.getElementById('editEventStatus').value = ev.status || "active";
            document.getElementById('editEventModal')?.classList.remove('hidden');
        }
        function closeEditEventModal() { document.getElementById('editEventModal')?.classList.add('hidden'); }

        async function updateEventFile() {
            if (!globalThis.sb) return;
            const id = document.getElementById('editEventTargetId').value;
            const name = document.getElementById('editEventName').value.trim();
            const date = document.getElementById('editEventDate').value;
            const status = document.getElementById('editEventStatus').value;
            if (!name || !date) return alert("必須項目を入力してください。");
            try {
                const { error } = await globalThis.sb.from('events').update({ name, date, status }).eq('id', id);
                if (error) throw error;
                closeEditEventModal();
                await loadEventMenu();
            } catch (err) { alert("更新に失敗: " + err.message); }
        }

        async function deleteEventFile() {
            if (!globalThis.sb) return;
            const id = document.getElementById('editEventTargetId').value;
            if (userRole === 'viewer') return alert("権限がありません。");
            if (!confirm(`🚨 大会データを完全に削除しますか？`)) return;
            try {
                await globalThis.sb.from('event_assignments').delete().eq('event_id', id);
                await globalThis.sb.from('messages').delete().eq('event_id', id);
                await globalThis.sb.from('locations').delete().eq('event_id', id);
                await globalThis.sb.from('events').delete().eq('id', id);
                closeEditEventModal();
                await loadEventMenu();
            } catch (err) { alert("削除失敗: " + err.message); }
        }

        async function createNewEventFile() {
            if (!globalThis.sb) return;
            const id = document.getElementById('newEventId').value.trim();
            const name = document.getElementById('newEventName').value.trim();
            const date = document.getElementById('newEventDate').value;
            if (!id || !name || !date) return alert("すべて入力してください。");
            try {
                const { error } = await globalThis.sb.from('events').insert([{ id, name, status: 'active', date }]);
                if (error) throw error;
                closeCreateEventModal();
                await loadEventMenu();
            } catch (err) { alert("作成失敗: " + err.message); }
        }

        function selectEventFile(eventId, eventName) {
            currentEventId = eventId;
            currentEventName = eventName;
            document.getElementById('lblCurrentEventName').innerText = eventName;
            document.getElementById('pageEventSelect')?.classList.add('hidden');
            document.getElementById('mainAppContent')?.classList.remove('hidden');
            document.getElementById('bottomNavBar')?.classList.remove('hidden');
            applyRoleRestrictions();
            switchTab('list');
            fetchSupabaseData();
            initRealtimeListener();
        }

        function returnToEventMenu() { currentEventId = null; document.getElementById('mainAppContent')?.classList.add('hidden'); document.getElementById('bottomNavBar')?.classList.add('hidden'); loadEventMenu(); }

        async function fetchSupabaseData(silent = false) {
            if (!globalThis.sb || !currentEventId) return;
            if (!silent) showLoading(true, "データベース同期中...");
            logStatus(`🔄 データベース同期中... (大会ID: ${currentEventId})`);
            try {
                const { data: locData, error: locErr } = await globalThis.sb
                    .from('locations')
                    .select('id, name, sort_order')
                    .eq('event_id', currentEventId)
                    .order('sort_order', { ascending: true })
                    .order('created_at', { ascending: true });
                    
                if (!locErr) {
                    rawCloudLocations = locData || [];
                }
                const prevFilter = document.getElementById('filterLocation')?.value || 'ALL';
                locations = [...defaultLocations, ...rawCloudLocations.map(l => l.name)];
                updateSelectBoxes();
                if (document.getElementById('filterLocation')) {
                    document.getElementById('filterLocation').value = locations.includes(prevFilter) || prevFilter === 'ALL' ? prevFilter : 'ALL';
                }
                if (!document.getElementById('locationManagerModal')?.classList.contains('hidden')) renderLocationManagerList();

                let assignData = null;
                let { data: t1, error: e1 } = await globalThis.sb
                    .from('event_assignments')
                    .select(`location, gear_id, gears:gear_id (id, name, category, num, mfr, serial, asset, attachments, image_url)`)
                    .eq('event_id', currentEventId);
                
                if (!e1 && t1 && t1.length > 0 && t1[0].gears !== null) {
                    assignData = t1;
                } else {
                    let { data: t2, error: e2 } = await globalThis.sb
                        .from('event_assignments')
                        .select(`location, gear_id, gears (id, name, category, num, mfr, serial, asset, attachments, image_url)`)
                        .eq('event_id', currentEventId);
                    if (!e2) assignData = t2;
                }

                gears = [];
                if (assignData && assignData.length > 0) {
                    assignData.forEach(item => {
                        if (item) {
                            if (item.gears) {
                                gears.push({
                                    id: item.gears.id, name: item.gears.name, category: item.gears.category || "未分類", num: item.gears.num,
                                    mfr: item.gears.mfr, serial: item.gears.serial, asset: item.gears.asset, attachments: item.gears.attachments,
                                    image_url: item.gears.image_url, location: item.location || "no assign"
                                });
                            } else {
                                gears.push({
                                    id: item.gear_id || "UNKNOWN-ID", name: "名称未定義 (マスター未同期)", category: "未分類", num: "-",
                                    mfr: "-", serial: "-", asset: "-", attachments: "", image_url: "", location: item.location || "no assign"
                                });
                            }
                        }
                    });
                }
                logStatus(`📊 最終認識機材カード数: ${gears.length}件`);

                const { data: msgData } = await globalThis.sb.from('messages').select('*').eq('event_id', currentEventId).order('created_at', { ascending: false });
                bbsMessages = msgData || [];

                renderTable();
                renderMaintenanceTable();
                renderBBS();
                
                if (!silent) {
                    setTimeout(() => { showLoading(false); }, 600);
                }
            } catch (err) { 
                logStatus("❌ 同期エラー発生: " + err.message); 
                document.getElementById('errorDiagnostic')?.classList.remove('hidden');
            }
        }

        async function manualRefreshData() {
            const icon = document.getElementById('iconRefresh');
            if (icon) icon.classList.add('animate-spin');
            logStatus("⏳ データベース上の新パーツをスキャン中...");
            
            if (globalThis.sb && currentEventId) {
                try {
                    const { data: masterGears } = await globalThis.sb.from('gears').select('id');
                    const { data: currentAssigned } = await globalThis.sb.from('event_assignments').select('gear_id').eq('event_id', currentEventId);
                    
                    if (masterGears) {
                        const assignedIds = new Set((currentAssigned || []).map(a => String(a.gear_id)));
                        const missingGears = masterGears.filter(g => !assignedIds.has(String(g.id)));
                        
                        if (missingGears.length > 0) {
                            logStatus(`💡 差分を発見: ${missingGears.length}件の新規機材を大会に自動同期します。`);
                            const insertRecords = missingGears.map(g => ({
                                event_id: currentEventId, gear_id: g.id, location: "no assign"
                            }));
                            await globalThis.sb.from('event_assignments').insert(insertRecords);
                        }
                    }
                } catch (e) {
                    console.error("差分自動同期失敗:", e);
                }
            }
            await fetchSupabaseData(false);
            if (icon) { setTimeout(() => { icon.classList.remove('animate-spin'); }, 600); }
        }

        function initRealtimeListener() {
            if (!globalThis.sb || !currentEventId) return;
            globalThis.sb.channel('db-assignments').on('postgres_changes', { event: '*', schema: 'public', table: 'event_assignments', filter: `event_id=eq.${currentEventId}` }, () => { fetchSupabaseData(true); }).subscribe();
            globalThis.sb.channel('db-messages').on('postgres_changes', { event: '*', schema: 'public', table: 'messages', filter: `event_id=eq.${currentEventId}` }, () => { fetchSupabaseData(true); }).subscribe();
            globalThis.sb.channel('db-locations').on('postgres_changes', { event: '*', schema: 'public', table: 'locations', filter: `event_id=eq.${currentEventId}` }, () => { fetchSupabaseData(true); }).subscribe();
        }

        async function changeGearLocation(gearId, newLoc) {
            if (!globalThis.sb || !currentEventId) return;
            try { await globalThis.sb.from('event_assignments').update({ location: newLoc }).eq('event_id', currentEventId).eq('gear_id', gearId); } catch (err) { alert("変更失敗: " + err.message); }
        }

        async function addLocationPoint() {
            if (!globalThis.sb || !currentEventId) return;
            const name = document.getElementById('newPointName').value.trim();
            if (!name) return alert("配置先名を入力してください。");
            try {
                const nextOrder = rawCloudLocations.length + 1;
                await globalThis.sb.from('locations').insert({ event_id: currentEventId, name, sort_order: nextOrder });
                document.getElementById('newPointName').value = "";
                await fetchSupabaseData(true);
            } catch (err) { alert("追加失敗: " + err.message); }
        }

        async function sendBBSMessage() {
            if (!globalThis.sb || !currentEventId) return;
            const name = document.getElementById('msgName').value.trim();
            const body = document.getElementById('msgBody').value.trim();
            const editId = document.getElementById('editMsgId').value;
            if (!name || !body) return alert("入力が不足しています。");
            localStorage.setItem('ekiden_bbs_name', name);
            try {
                if (editId) {
                    await globalThis.sb.from('messages').update({ name, body }).eq('id', editId);
                    cancelBBSEdit();
                } else {
                    await globalThis.sb.from('messages').insert([{ name, body, event_id: currentEventId }]);
                    document.getElementById('msgBody').value = "";
                }
            } catch (err) { alert("送信失敗: " + err.message); }
        }

        function startBBSEdit(id) {
            const msg = bbsMessages.find(m => String(m.id) === String(id));
            if (!msg) return;
            document.getElementById('editMsgId').value = msg.id;
            document.getElementById('msgName').value = msg.name || "";
            document.getElementById('msgBody').value = msg.body || "";
            document.getElementById('bbsFormTitle').innerHTML = `<i class="fas fa-edit text-yellow-500"></i> メッセージの編集モード`;
            document.getElementById('btnBBSSubmit').innerText = "更新";
            document.getElementById('btnBBSSubmit').className = "bg-yellow-500 text-bgDark font-black text-xs px-4 py-1.5 rounded-lg transition active:scale-[0.95] shrink-0";
            document.getElementById('btnCancelEdit').classList.remove('hidden');
        }

        function cancelBBSEdit() {
            document.getElementById('editMsgId').value = "";
            document.getElementById('msgBody').value = "";
            document.getElementById('bbsFormTitle').innerHTML = `<i class="fas fa-comment-dots"></i> 現場全体へメッセージを一斉送信`;
            document.getElementById('btnBBSSubmit').innerText = "送信";
            document.getElementById('btnBBSSubmit').className = "bg-accentGreen text-bgDark font-black text-xs px-4 py-1.5 rounded-lg transition active:scale-[0.95] shrink-0";
            document.getElementById('btnCancelEdit').classList.add('hidden');
        }

        async function addGear() {
            if (!globalThis.sb || !currentEventId) return;
            const name = document.getElementById('addName').value.trim();
            const id = document.getElementById('addId').value.trim();
            const category = document.getElementById('addCat').value.trim();
            const location = document.getElementById('addLoc').value;
            const num = document.getElementById('addNum').value.trim();
            const mfr = document.getElementById('addMfr').value.trim();
            if (!name || !id || !category) return alert("必須項目を入力してください。");
            showLoading(true, "REGISTERING...");
            try {
                await globalThis.sb.from('gears').upsert({ id, name, category, num, mfr });
                await globalThis.sb.from('event_assignments').insert({ event_id: currentEventId, gear_id: id, location });
                document.getElementById('addName').value = ""; document.getElementById('addId').value = ""; document.getElementById('addCat').value = "";
                switchTab('list');
            } catch(err) { alert("登録失敗: " + err.message); } finally { showLoading(false); }
        }

        async function assignExistingGear() {
            if (!globalThis.sb || !currentEventId) return;
            const gearId = document.getElementById('assignGearId').value.trim();
            const location = document.getElementById('assignLoc').value;
            if(!gearId) return alert("IDを入力してください。");
            showLoading(true, "ASSIGNING...");
            try {
                const { data } = await globalThis.sb.from('gears').select('id').eq('id', gearId).single();
                if(!data) throw new Error("マスター未登録のIDです。");
                await globalThis.sb.from('event_assignments').insert({ event_id: currentEventId, gear_id: gearId, location });
                document.getElementById('assignGearId').value = "";
                switchTab('list');
            } catch (err) { alert(err.message); } finally { showLoading(false); }
        }

        async function saveMaintenanceData() {
            if (!globalThis.sb) return;
            const id = document.getElementById('editTargetId').value;
            const name = document.getElementById('editName').value.trim();
            const category = document.getElementById('editCat').value.trim();
            if (!name || !category) return alert("入力が不足しています。");
            showLoading(true, "SAVING...");
            try {
                const { error: updateError } = await globalThis.sb.from('gears').update({
                    name, 
                    category, 
                    num: document.getElementById('editNum').value.trim(), 
                    mfr: document.getElementById('editMfr').value.trim(),
                    serial: document.getElementById('editSerial').value.trim(), 
                    asset: document.getElementById('editAsset').value.trim(),
                    attachments: document.getElementById('editAttachments').value.trim(), 
                    image_url: currentUploadedUrl
                }).eq('id', id);

                if (updateError) throw updateError;

                closeMaintModal();
                await fetchSupabaseData(true);
            } catch(err) { 
                alert("変更の保存に失敗しました: " + err.message); 
            } finally { 
                showLoading(false); 
            }
        }

        async function deleteGearFromAssignment() {
            if (!globalThis.sb || !currentEventId) return;
            const id = document.getElementById('editTargetId').value;
            if (confirm("この大会から除外しますか？")) {
                closeMaintModal(); showLoading(true, "REMOVING...");
                try { await globalThis.sb.from('event_assignments').delete().eq('event_id', currentEventId).eq('gear_id', id); } catch (err) { alert(err.message); } finally { showLoading(false); }
            }
        }

        function applyRoleRestrictions() {
            userRole = localStorage.getItem('ekiden_user_role') || 'viewer';
            const isAdmin = (userRole === 'admin');
            const isViewer = (userRole === 'viewer');
            const isStaff = (userRole === 'staff');
            if (isViewer && document.getElementById('btnOpenCreateEventModal')) document.getElementById('btnOpenCreateEventModal').style.display = 'none';
            if (document.getElementById('adminLocationForm')) document.getElementById('adminLocationForm').style.display = isViewer ? 'none' : 'flex';
            if (document.getElementById('btnOpenLocationManager')) document.getElementById('btnOpenLocationManager').style.display = isAdmin ? 'inline-block' : 'none';
            if (isViewer || isStaff) {
                if(document.getElementById('navRegister')) document.getElementById('navRegister').style.display = 'none';
                if(document.getElementById('navMaint')) document.getElementById('navMaint').style.display = 'none';
            }
            if (document.getElementById('bbsFormContainer')) document.getElementById('bbsFormContainer').style.display = isViewer ? 'none' : 'block';
            globalThis.isViewerMode = isViewer;
        }

        function openLocationManagerModal() { 
            if (userRole === 'admin') {
                document.getElementById('locationManagerModal')?.classList.remove('hidden');
                if(document.getElementById('lblOrderSavedStatus')) document.getElementById('lblOrderSavedStatus').innerText = "";
                renderLocationManagerList(); 
            } 
        }
        
        function closeLocationManagerModal() { document.getElementById('locationManagerModal')?.classList.add('hidden'); }

        function handleDragStart(e) {
            dragTargetElement = e.currentTarget;
            e.currentTarget.classList.add('sortable-dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragOver(e) {
            e.preventDefault();
            if (!dragTargetElement || e.currentTarget === dragTargetElement) return;
            
            const container = document.getElementById('locationManagerList');
            const items = [...container?.querySelectorAll('.sortable-item') || []];
            const currentIdx = items.indexOf(dragTargetElement);
            const targetIdx = items.indexOf(e.currentTarget);
            
            if (currentIdx < targetIdx) {
                e.currentTarget.after(dragTargetElement);
            } else {
                e.currentTarget.before(dragTargetElement);
            }
        }

        function handleDragEnd(e) {
            e.currentTarget.classList.remove('sortable-dragging');
            dragTargetElement = null;
            rebuildRawLocationsFromDOM();
        }

        function renderLocationManagerList() {
            const container = document.getElementById('locationManagerList');
            if (!container) return;
            if (!rawCloudLocations || rawCloudLocations.length === 0) { 
                container.innerHTML = `<div class="text-center py-6 text-slate-500 text-xs">カスタム配置先はありません。</div>`; return; 
            }
            
            container.innerHTML = rawCloudLocations.map((loc, idx) => `
                <div class="sortable-item bg-bgDark border border-borderStroke p-2 rounded-xl flex items-center justify-between gap-2 shadow-inner group" 
                     draggable="true" 
                     data-loc-id="${loc.id}" 
                     data-index="${idx}"
                     ondragstart="handleDragStart(event)"
                     ondragover="handleDragOver(event)"
                     ondragend="handleDragEnd(event)">
                    
                    <div class="text-slate-600 group-hover:text-slate-400 px-1 cursor-grab active:cursor-grabbing text-xs">
                        <i class="fas fa-grip-lines"></i>
                    </div>
                    
                    <input type="text" value="${loc.name}" onchange="updateLocationName(${loc.id}, this.value)" 
                           class="flex-1 bg-cardBg border border-borderStroke rounded px-2 py-1 text-xs text-white outline-none font-bold focus:border-yellow-500">
                    
                    <div class="flex items-center gap-0.5 shrink-0">
                        <button onclick="moveLocationRow(${idx}, -1)" class="bg-slate-900 text-slate-400 hover:text-white p-1 rounded text-[10px]">
                            <i class="fas fa-chevron-up"></i>
                        </button>
                        <button onclick="moveLocationRow(${idx}, 1)" class="bg-slate-900 text-slate-400 hover:text-white p-1 rounded text-[10px]">
                            <i class="fas fa-chevron-down"></i>
                        </button>
                    </div>
                    
                    <button onclick="deleteLocationPoint(${loc.id}, '${loc.name}')" class="bg-rose-950/40 text-rose-400 p-1.5 rounded-lg text-xs shrink-0 hover:bg-rose-900/60 transition">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            `).join('');
        }

        function moveLocationRow(index, direction) {
            const targetIndex = index + direction;
            if (targetIndex < 0 || targetIndex >= rawCloudLocations.length) return;
            
            const temp = rawCloudLocations[index];
            rawCloudLocations[index] = rawCloudLocations[targetIndex];
            rawCloudLocations[targetIndex] = temp;
            
            renderLocationManagerList();
            const lbl = document.getElementById('lblOrderSavedStatus');
            if (lbl) {
                lbl.innerText = "⚠️ 順序変更未保存";
                lbl.className = "text-[10px] font-bold text-yellow-500 font-mono";
            }
        }

        function rebuildRawLocationsFromDOM() {
            const container = document.getElementById('locationManagerList');
            const items = [...container?.querySelectorAll('.sortable-item') || []];
            
            const newOrderedList = items.map(item => {
                const id = parseInt(item.getAttribute('data-loc-id'));
                return rawCloudLocations.find(l => l.id === id);
            });
            
            rawCloudLocations = newOrderedList;
            const lbl = document.getElementById('lblOrderSavedStatus');
            if (lbl) {
                lbl.innerText = "⚠️ 順序変更未保存";
                lbl.className = "text-[10px] font-bold text-yellow-500 font-mono";
            }
        }

        async function saveLocationOrder() {
            if (userRole !== 'admin' || !globalThis.sb || !currentEventId) return;
            
            const labelStatus = document.getElementById('lblOrderSavedStatus');
            if (labelStatus) {
                labelStatus.innerText = "⏳ 順序書き込み中...";
                labelStatus.className = "text-[10px] font-bold text-slate-400 font-mono animate-pulse";
            }
            
            try {
                const promises = rawCloudLocations.map((loc, index) => {
                    return globalThis.sb
                        .from('locations')
                        .update({ sort_order: index + 1 })
                        .eq('id', loc.id);
                });
                
                await Promise.all(promises);
                
                if (labelStatus) {
                    labelStatus.innerText = "✅ 並び順を保存完了";
                    labelStatus.className = "text-[10px] font-bold text-accentGreen font-mono";
                }
                
                await fetchSupabaseData(true);
            } catch (err) {
                alert("並び順の保存に失敗しました: " + err.message);
                if (labelStatus) {
                    labelStatus.innerText = "❌ 保存失敗";
                    labelStatus.className = "text-[10px] font-bold text-rose-500 font-mono";
                }
            }
        }

        async function updateLocationName(id, newName) {
            if (userRole !== 'admin') return;
            const cleanName = newName.trim(); if (!cleanName) return alert("名称を入力してください。");
            const target = rawCloudLocations.find(l => l.id === id); if (!target) return;
            const oldName = target.name;
            try {
                await globalThis.sb.from('locations').update({ name: cleanName }).eq('id', id);
                await globalThis.sb.from('event_assignments').update({ location: cleanName }).eq('event_id', currentEventId).eq('location', oldName);
                target.name = cleanName;
                const idx = locations.indexOf(oldName);
                if (idx !== -1) locations[idx] = cleanName;
                updateSelectBoxes();
                renderTable();
            } catch (err) { alert("名称の変更に失敗しました: " + err.message); }
        }

        async function deleteLocationPoint(id, name) {
            if (userRole !== 'admin') return;
            if (!confirm(`配置先「${name}」を削除しますか？`)) return;
            try {
                await globalThis.sb.from('event_assignments').update({ location: 'no assign' }).eq('event_id', currentEventId).eq('location', name);
                await globalThis.sb.from('locations').delete().eq('id', id);
                await fetchSupabaseData(true);
            } catch (err) { alert("削除失敗: " + err.message); }
        }

        function groupByCategoryAndSortNumber(a, b) {
            const catA = a.category ? String(a.category) : '';
            const catB = b.category ? String(b.category) : '';
            
            const catComparison = catA.localeCompare(catB, 'ja');
            if (catComparison !== 0) {
                return catComparison;
            }
            
            const numA = a.num ? String(a.num) : '';
            const numB = b.num ? String(b.num) : '';
            return numA.localeCompare(numB, undefined, { numeric: true, sensitivity: 'base' });
        }

        function renderTable() {
            const container = document.getElementById('gearCardList'); if (!container) return;
            const searchKeyword = document.getElementById('searchKeyword').value.toLowerCase();
            const filterLoc = document.getElementById('filterLocation').value;
            
            const badge = document.getElementById('totalBadge');
            if (badge) badge.innerText = gears.length;

            let displayData = gears.filter(gear => {
                const matchesKeyword = (gear.name && gear.name.toLowerCase().includes(searchKeyword)) || (gear.category && gear.category.toLowerCase().includes(searchKeyword)) || (gear.id && gear.id.toLowerCase().includes(searchKeyword));
                const matchesLocation = filterLoc === 'ALL' || gear.location === filterLoc;
                return matchesKeyword && matchesLocation;
            });
            
            if (displayData.length === 0) { 
                container.innerHTML = `<div class="col-span-full text-center text-slate-500 py-6 text-xs">該当機材なし</div>`; 
                return; 
            }
            
            displayData.sort(groupByCategoryAndSortNumber);
            
            container.innerHTML = displayData.map(gear => {
                const modelKey = gear.name ? gear.name.split(/[  ]/)[0] : 'default';
                
                const displayImageUrl = (gear.image_url && gear.image_url.trim() !== "")
                    ? gear.image_url
                    : `${SUPABASE_URL}/storage/v1/object/public/gear-image/models/${modelKey}.jpg`;

                return `
                    <div class="bg-cardBg border border-borderStroke rounded-xl overflow-hidden shadow-md cursor-pointer hover:border-accentGreen/40 flex flex-row p-2 gap-3 items-center" onclick="openMaintModal('${gear.id}')">
                        
                        <div class="w-16 h-16 bg-slate-950 rounded-lg flex items-center justify-center overflow-hidden shrink-0 border border-borderStroke/60 relative p-0.5">
                            <img src="${displayImageUrl}" alt="${gear.name}" loading="lazy" 
                                 class="max-h-full max-w-full object-contain"
                                 onclick="event.stopPropagation(); openZoomModal('${displayImageUrl}')">
                        </div>
                        
                        <div class="flex-1 min-w-0 space-y-1">
                            <div class="flex items-center justify-between gap-1">
                                <span class="inline-block bg-emerald-500/10 text-accentGreen text-[8px] px-1.5 py-0.5 rounded font-bold whitespace-nowrap truncate">${gear.category}</span>
                                <span class="font-mono text-[9px] text-slate-500 font-bold truncate">ID: ${gear.id}</span>
                            </div>
                            
                            <div class="flex items-center gap-1.5 w-full min-w-0">
                                <span class="font-bold text-white text-xs truncate max-w-[75%]">${gear.name}</span>
                                <span class="font-mono text-[10px] text-slate-400 font-bold shrink-0">${gear.num || '-'}</span>
                            </div>
                            
                            <div class="flex items-center justify-between gap-2 border-t border-borderStroke/30 pt-1.5" onclick="event.stopPropagation()">
                                <span class="text-[8px] text-slate-500 font-mono truncate">S/N: ${gear.serial || '----'}</span>
                                <select onchange="changeGearLocation('${gear.id}', this.value)" ${globalThis.isViewerMode ? 'disabled' : ''} class="bg-bgDark border border-borderStroke text-slate-100 py-1.5 px-2 rounded-lg text-xs font-bold outline-none flex-1 max-w-[150px] text-right focus:border-accentGreen cursor-pointer">
                                    ${locations.map(loc => `<option value="${loc}" ${gear.location === loc ? 'selected' : ''}>${loc}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openZoomModal(imgUrl) {
            const modal = document.getElementById('imageZoomModal');
            const zoomedImg = document.getElementById('zoomedImage');
            if (modal && zoomedImg) {
                zoomedImg.src = imgUrl;
                modal.classList.remove('hidden');
            }
        }

        function closeZoomModal() {
            document.getElementById('imageZoomModal')?.classList.add('hidden');
        }

        function renderBBS() {
            const container = document.getElementById('bbsTimeline'); if (!container) return;
            if (bbsMessages.length === 0) { container.innerHTML = `<div class="text-center text-slate-500 py-6 text-xs">投稿はありません。</div>`; return; }
            container.innerHTML = bbsMessages.map(msg => {
                const date = new Date(msg.created_at);
                const timeStr = `${date.getMonth() + 1}/${date.getDate()} ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
                return `
                    <div class="bg-cardBg border border-borderStroke p-2.5 rounded-xl space-y-1">
                        <div class="flex items-center justify-between border-b border-borderStroke/40 pb-1 gap-2">
                            <div class="flex items-center gap-2 truncate">
                                <span class="text-accentGreen font-bold text-xs truncate">${msg.name}</span>
                                <span class="text-[9px] text-slate-500 font-mono">${timeStr}</span>
                            </div>
                            ${!globalThis.isViewerMode ? `<button onclick="startBBSEdit('${msg.id}')" class="text-[9px] bg-slate-900 text-slate-400 border border-borderStroke px-1.5 py-0.5 rounded">編集</button>` : ''}
                        </div>
                        <p class="text-gray-200 text-xs whitespace-pre-wrap leading-tight pt-0.5 keep-word">${msg.body}</p>
                    </div>
                `;
            }).join('');
        }

        function renderMaintenanceTable() {
            const tbody = document.getElementById('maintTableBody'); if(!tbody) return;
            const keyword = document.getElementById('maintSearchKeyword').value.toLowerCase();
            let displayData = gears.filter(gear => (gear.id && gear.id.toLowerCase().includes(keyword)) || (gear.name && gear.name.toLowerCase().includes(keyword)) || (gear.category && gear.category.toLowerCase().includes(keyword)));
            
            displayData.sort(groupByCategoryAndSortNumber);
            
            tbody.innerHTML = displayData.map(gear => `
                <tr onclick="openMaintModal('${gear.id}')" class="hover:bg-slate-800/60 cursor-pointer border-b border-borderStroke transition">
                    <td class="p-2 font-mono text-slate-400 font-bold truncate">${gear.id}</td>
                    <td class="p-2"><span class="bg-yellow-500/10 text-yellow-400 text-[10px] px-1.5 py-0.5 rounded font-bold">${gear.category}</span></td>
                    <td class="p-2 font-bold text-white truncate">${gear.name}</td>
                    <td class="p-2 text-right text-yellow-500 font-bold text-[10px]">></td>
                </tr>
            `).join('');
        }

        function openMaintModal(id) {
            const gear = gears.find(g => String(g.id) === String(id)); if (!gear) return;
            document.getElementById('editTargetId').value = gear.id;
            document.getElementById('editIdDisplay').innerText = gear.id;
            document.getElementById('modalTitle').innerText = `機材詳細 [ID: ${gear.id}]`;
            document.getElementById('editName').value = gear.name || "";
            document.getElementById('editCat').value = gear.category || "";
            document.getElementById('editNum').value = gear.num || "";
            document.getElementById('editMfr').value = gear.mfr || "";
            document.getElementById('editSerial').value = gear.serial || "";
            document.getElementById('editAsset').value = gear.asset || "";
            document.getElementById('editAttachments').value = gear.attachments || "";
            currentUploadedUrl = gear.image_url || "";
            refreshModalImagePreview();

            const fields = ['editName', 'editCat', 'editNum', 'editMfr', 'editSerial', 'editAsset', 'editAttachments'];
            fields.forEach(f => {
                const el = document.getElementById(f);
                if(el) el.disabled = globalThis.isViewerMode;
            });
            
            if(document.getElementById('btnCameraUpload')) document.getElementById('btnCameraUpload').style.display = globalThis.isViewerMode ? 'none' : 'inline-block';
            if(document.getElementById('btnModalDelete')) document.getElementById('btnModalDelete').style.display = globalThis.isViewerMode ? 'none' : 'inline-block';
            if(document.getElementById('btnModalSave')) document.getElementById('btnModalSave').style.display = globalThis.isViewerMode ? 'none' : 'inline-block';
            document.getElementById('maintModal')?.classList.remove('hidden');
        }
        
        function closeMaintModal() { document.getElementById('maintModal')?.classList.add('hidden'); }

        function refreshModalImagePreview() {
            const container = document.getElementById('imagePreviewContainer');
            const deleteBtn = document.getElementById('deleteImageBtn');
            const editNameVal = document.getElementById('editName')?.value || 'default';
            const modelKey = editNameVal.split(/[  ]/)[0];
            
            let finalImgUrl = (currentUploadedUrl && currentUploadedUrl.trim() !== "")
                ? currentUploadedUrl
                : `${SUPABASE_URL}/storage/v1/object/public/gear-image/models/${modelKey}.jpg`;

            if (finalImgUrl) {
                if(container) {
                    container.innerHTML = `<img src="${finalImgUrl}" class="max-w-full max-h-full object-contain rounded-xl shadow-md">`;
                    container.onclick = () => openZoomModal(finalImgUrl);
                }
                if(deleteBtn && !globalThis.isViewerMode && currentUploadedUrl) deleteBtn.classList.remove('hidden');
            } else {
                if(container) {
                    container.innerHTML = `<i class="fas fa-image text-2xl text-slate-700 mb-1"></i><span class="text-[8px] text-slate-500 font-bold uppercase tracking-wider">NO IMAGE</span>`;
                    container.onclick = null;
                }
                if(deleteBtn) deleteBtn.classList.add('hidden');
            }
        }
        
        function deleteGearImage() { currentUploadedUrl = ""; refreshModalImagePreview(); }

        async function handleImageUpload(event) {
            if (!globalThis.sb) return;
            const file = event.target.files[0]; if (!file) return;
            showLoading(true, "写真データを処理中...");
            try {
                const filePath = `${Date.now()}_${Math.random().toString(36).substring(2,7)}`;
                
                const { error: uploadError } = await globalThis.sb.storage.from('gear-image').upload(filePath, file);
                if (uploadError) throw uploadError;

                const { data } = globalThis.sb.storage.from('gear-image').getPublicUrl(filePath);
                
                currentUploadedUrl = data.publicUrl; 
                refreshModalImagePreview();
            } catch (err) { 
                alert("アップロードに失敗しました: " + err.message); 
            } finally { 
                showLoading(false); 
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            applyRoleRestrictions();
            const cachedName = localStorage.getItem('ekiden_bbs_name');
            if(cachedName && document.getElementById('msgName')) document.getElementById('msgName').value = cachedName;
            loadEventMenu();
        });
    </script>
</body>
</html>
