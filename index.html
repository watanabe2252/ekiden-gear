            </div>
            <div class="flex gap-1.5 justify-end pt-2">
                <button onclick="deleteGearFromAssignment()" class="text-rose-500 mr-auto font-bold"><i class="fas fa-trash-alt"></i> 大会から外す</button>
                <button onclick="closeMaintModal()" class="bg-slate-800 text-gray-300 px-3 py-1.5 rounded-lg">閉じる</button>

            </div>

        <button id="navRegister" onclick="switchTab('register')" class="flex flex-col items-center text-slate-500 text-[9px] font-bold flex-1"><i class="fas fa-edit text-sm"></i><span>データ登録</span></button>

    <!-- 内部ロジックシステム -->
    <script>
        globalThis.sb = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
        const defaultLocations = ["no assign"];
        let locations = [...defaultLocations];
        let rawCloudLocations = []; 
        let events = [];
        let currentEventId = null; 
        let userRole = "viewer";   
        let gears = [];             
        let bbsMessages = [];

        function logStatus(msg) {
            console.log(msg);
            const el = document.getElementById('errorDetails');
            if (el) el.innerHTML += `> ${msg}<br>`;
        }

        function handleLogout() {
            localStorage.removeItem('ekiden_secure_session');
            window.location.href = "login.html";
        }

        async function loadEventMenu() {
            if (!globalThis.sb) return;
            document.getElementById('loadingScreen').classList.remove('hidden');
            try {
                const { data, error } = await globalThis.sb.from('events').select('*').order('date', { ascending: false });
                if (error) throw error;
                events = data || [];
                const container = document.getElementById('eventListContainer');
                document.getElementById('lblUserRole').innerText = userRole.toUpperCase();
                container.innerHTML = events.map(ev => `
                    <div onclick="selectEventFile('${ev.id}', '${ev.name}')" class="bg-cardBg border border-borderStroke p-3 rounded-xl cursor-pointer text-left">
                        <h4 class="text-xs font-bold text-white">📁 ${ev.name}</h4>
                    </div>
                `).join('');
                document.getElementById('pageEventSelect').classList.remove('hidden');
                document.getElementById('loadingScreen').classList.add('hidden');
            } catch (err) {
                logStatus("❌ ロード失敗: " + err.message);
                document.getElementById('errorDiagnostic').classList.remove('hidden');
            }
        }

        function selectEventFile(eventId, eventName) {
            currentEventId = eventId;
            document.getElementById('lblCurrentEventName').innerText = eventName;
            document.getElementById('pageEventSelect').classList.add('hidden');
            document.getElementById('mainAppContent').classList.remove('hidden');
            document.getElementById('bottomNavBar').classList.remove('hidden');
            applyRoleRestrictions();
            switchTab('list');
            fetchSupabaseData();
        }

        function returnToEventMenu() { currentEventId = null; loadEventMenu(); }

        // 💡 100%安全：リレーションを一切破棄し、フロント側で完全手動マージする超強硬ロジック
        async function fetchSupabaseData(silent = false) {
            if (!globalThis.sb || !currentEventId) return;
            if (!silent) document.getElementById('loadingScreen').classList.remove('hidden');
            logStatus(`🔄 完全非リレーション同期を実行中...`);

            try {
                // 1. 配置先（locations）の取得
                const { data: locData } = await globalThis.sb.from('locations').select('*').eq('event_id', currentEventId);
                rawCloudLocations = locData || [];
                locations = [...defaultLocations, ...rawCloudLocations.map(l => l.name)];
                updateSelectBoxes();

                // 2. event_assignments（アサイン単体）を取得
                const { data: assignments, error: assignErr } = await globalThis.sb.from('event_assignments').select('location, gear_id').eq('event_id', currentEventId);
                if (assignErr) throw assignErr;

                // 3. gears（マスター機材単体）を取得
                const { data: masterGears, error: gearErr } = await globalThis.sb.from('gears').select('*');
                if (gearErr) throw gearErr;

                // マスター機材を高速検索できるようにMap化
                const gearMap = new Map();
                if (masterGears) {
                    masterGears.forEach(g => gearMap.set(String(g.id), g));
                }

                // 4. 手動マージを実行（リレーションエラーを永久に回避）
                gears = [];
                if (assignments) {
                    assignments.forEach(item => {
                        const gearIdStr = String(item.gear_id);
                        const matchedMaster = gearMap.get(gearIdStr);

                        if (matchedMaster) {
                            gears.push({
                                id: matchedMaster.id,
                                name: matchedMaster.name,
                                category: matchedMaster.category,
                                num: matchedMaster.num || "-",
                                mfr: matchedMaster.mfr || "-",
                                location: item.location || "no assign"
                            });
                        } else {
                            // 万が一マスターにデータがなくても、カードだけは絶対に構築して画面に出す
                            gears.push({
                                id: item.gear_id,
                                name: "名称未定義 (マスター未同期)",
                                category: "未分類",
                                num: "-",
                                mfr: "-",
                                location: item.location || "no assign"
                            });
                        }
                    });
                }
                logStatus(`📊 マージ完了。総カード数: ${gears.length} 件`);

                const { data: msgData } = await globalThis.sb.from('messages').select('*').eq('event_id', currentEventId).order('created_at', { ascending: false });
                bbsMessages = msgData || [];

                renderTable();
                renderLocationManagerList();
                renderBBS();
                
                document.getElementById('loadingScreen').classList.add('hidden');
            } catch (err) {
                logStatus(`❌ 同期致命的エラー: ${err.message}`);
                document.getElementById('errorDiagnostic').classList.remove('hidden');
            }
        }

        async function manualRefreshData() {
            logStatus("⏳ 手動差分修復を実行...");
            if (globalThis.sb && currentEventId) {
                const { data: master } = await globalThis.sb.from('gears').select('id');
                const { data: current } = await globalThis.sb.from('event_assignments').select('gear_id').eq('event_id', currentEventId);
                if (master) {
                    const currentSet = new Set((current || []).map(c => String(c.gear_id)));
                    const missing = master.filter(m => !currentSet.has(String(m.id)));
                    if (missing.length > 0) {
                        const recs = missing.map(m => ({ event_id: currentEventId, gear_id: m.id, location: "no assign" }));
                        await globalThis.sb.from('event_assignments').insert(recs);
                    }
                }
            }
            await fetchSupabaseData(false);
        }

        function renderTable() {
            const container = document.getElementById('gearCardList');
            const searchKeyword = document.getElementById('searchKeyword').value.toLowerCase();
            const filterLoc = document.getElementById('filterLocation').value;
            document.getElementById('totalBadge').innerText = gears.length;

            let displayData = gears.filter(gear => {
                const matchesKeyword = (gear.name && gear.name.toLowerCase().includes(searchKeyword)) || (gear.category && gear.category.toLowerCase().includes(searchKeyword)) || (gear.id && gear.id.toLowerCase().includes(searchKeyword));
                const matchesLocation = filterLoc === 'ALL' || gear.location === filterLoc;
                return matchesKeyword && matchesLocation;
            });

            if (displayData.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center text-slate-500 py-6 text-xs">該当機材なし</div>`;
                return;
            }

            container.innerHTML = displayData.map(gear => `
                <div class="bg-cardBg border border-borderStroke rounded-xl p-3 flex flex-col justify-between gap-2 shadow-md hover:border-accentGreen/40" onclick="openMaintModal('${gear.id}')">
                    <div class="space-y-1">
                        <span class="inline-block bg-emerald-500/10 text-accentGreen text-[9px] px-1.5 py-0.5 rounded font-bold">${gear.category || '未分類'}</span>
                        <div class="flex flex-wrap items-baseline gap-x-1.5 w-full">
                            <span class="font-bold text-white text-xs keep-word">${gear.name}</span>
                            <span class="font-mono text-[10px] text-slate-400 font-bold bg-slate-900 px-1 py-0.5 rounded">${gear.num || '-'}</span>
                        </div>
                    </div>
                    <div class="border-t border-borderStroke/60 pt-1.5 flex items-center justify-between gap-2" onclick="event.stopPropagation()">
                        <span class="text-[9px] text-slate-500 font-bold shrink-0">📍配置</span>
                        <select onchange="changeGearLocation('${gear.id}', this.value)" ${globalThis.isViewerMode ? 'disabled' : ''} class="bg-bgDark border border-borderStroke text-slate-200 px-1.5 py-1 rounded-lg text-xs font-semibold outline-none w-full max-w-[170px]">
                            ${locations.map(loc => `<option value="${loc}" ${gear.location === loc ? 'selected' : ''}>${loc}</option>`).join('')}
                        </select>
                    </div>
                </div>
            `).join('');
        }

        function openMaintModal(id) {
            const gear = gears.find(g => String(g.id) === String(id)); if (!gear) return;
            document.getElementById('editTargetId').value = gear.id;
            document.getElementById('modalTitle').innerText = `機材詳細 [ID: ${gear.id}]`;
            document.getElementById('editName').value = gear.name || "";
            document.getElementById('editCat').value = gear.category || "";
            document.getElementById('editNum').value = gear.num || "";
            document.getElementById('editMfr').value = gear.mfr || "";
            document.getElementById('maintModal').classList.remove('hidden');
        }
        function closeMaintModal() { document.getElementById('maintModal').classList.add('hidden'); }

        async function saveMaintenanceData() {
            if (!globalThis.sb) return;
            const id = document.getElementById('editTargetId').value;
            const name = document.getElementById('editName').value.trim();
            const category = document.getElementById('editCat').value.trim();
            try {
                await globalThis.sb.from('gears').update({
                    name, category, num: document.getElementById('editNum').value.trim(), mfr: document.getElementById('editMfr').value.trim()
                }).eq('id', id);
                closeMaintModal();
                await fetchSupabaseData(true);
            } catch(err) { alert(err.message); }
        }

        async function deleteGearFromAssignment() {
            if (!globalThis.sb || !currentEventId) return;
            const id = document.getElementById('editTargetId').value;
            if (confirm("この大会から除外しますか？")) {
                try { 
                    await globalThis.sb.from('event_assignments').delete().eq('event_id', currentEventId).eq('gear_id', id); 
                    closeMaintModal();
                    await fetchSupabaseData(true);
                } catch (err) { alert(err.message); }
            }
        }

        async function changeGearLocation(gearId, newLoc) {
            if (!globalThis.sb || !currentEventId) return;
            try { await globalThis.sb.from('event_assignments').update({ location: newLoc }).eq('event_id', currentEventId).eq('gear_id', gearId); } catch (err) { alert("変更失敗: " + err.message); }
        }

        async function addGear() {
            if (!globalThis.sb || !currentEventId) return;
            const name = document.getElementById('addName').value.trim();
            const id = document.getElementById('addId').value.trim();
            const category = document.getElementById('addCat').value.trim();
            const location = document.getElementById('addLoc').value;
            const num = document.getElementById('addNum').value.trim();
            const mfr = document.getElementById('addMfr').value.trim();
            if (!name || !id || !category) return alert("必須項目を入力してください。");
            try {
                await globalThis.sb.from('gears').upsert({ id, name, category, num, mfr });
                await globalThis.sb.from('event_assignments').insert({ event_id: currentEventId, gear_id: id, location });
                document.getElementById('addName').value = ""; document.getElementById('addId').value = ""; document.getElementById('addCat').value = "";
                switchTab('list');
                await fetchSupabaseData(true);
            } catch(err) { alert("登録失敗: " + err.message); }
        }

        function renderBBS() {
            const container = document.getElementById('bbsTimeline'); if (!container) return;
            if (bbsMessages.length === 0) { container.innerHTML = `<div class="text-center text-slate-500 py-6 text-xs">投稿はありません。</div>`; return; }
            container.innerHTML = bbsMessages.map(msg => `
                <div class="bg-cardBg border border-borderStroke p-2.5 rounded-xl space-y-1">
                    <div class="flex items-center justify-between border-b border-borderStroke/40 pb-1 gap-2">
                        <span class="text-accentGreen font-bold text-xs truncate">${msg.name}</span>
                    </div>
                    <p class="text-gray-200 text-xs whitespace-pre-wrap leading-tight pt-0.5 keep-word">${msg.body}</p>
                </div>
            `).join('');
        }

        async function sendBBSMessage() {
            if (!globalThis.sb || !currentEventId) return;
            const name = document.getElementById('msgName').value.trim();
            const body = document.getElementById('msgBody').value.trim();
            if (!name || !body) return alert("入力してください。");
            try {
                await globalThis.sb.from('messages').insert([{ name, body, event_id: currentEventId }]);
                document.getElementById('msgBody').value = "";
                await fetchSupabaseData(true);
            } catch (err) { alert("送信失敗: " + err.message); }
        }

        function renderLocationManagerList() {
            const container = document.getElementById('locationManagerList'); if (!container) return;
            if (rawCloudLocations.length === 0) { container.innerHTML = `<div class="text-center py-4 text-slate-500 text-xs">カスタム配置先はありません。</div>`; return; }
            container.innerHTML = rawCloudLocations.map(loc => `
                <div class="bg-bgDark border border-borderStroke p-2 rounded-lg flex items-center justify-between gap-2">
                    <span class="flex-1 text-xs text-white px-2 font-bold">${loc.name}</span>
                    <button onclick="deleteLocationPoint(${loc.id}, '${loc.name}')" class="bg-rose-950/40 text-rose-400 p-1.5 rounded-lg text-xs shrink-0"><i class="fas fa-trash-alt"></i></button>
                </div>
            `).join('');
        }

        async function addLocationPoint() {
            const input = document.getElementById('newPointName'); const name = input.value.trim();
            if (!name) return alert("配置先名を入力してください。");
            try { 
                await globalThis.sb.from('locations').insert([{ event_id: currentEventId, name }]); 
                input.value = ""; 
                await fetchSupabaseData(true);
            } catch (err) { alert("追加失敗: " + err.message); }
        }

        async function deleteLocationPoint(id, name) {
            if (!confirm(`配置先「${name}」を削除しますか？`)) return;
            try {
                await globalThis.sb.from('event_assignments').update({ location: 'no assign' }).eq('event_id', currentEventId).eq('location', name);
                await globalThis.sb.from('locations').delete().eq('id', id);
                await fetchSupabaseData(true);
            } catch (err) { alert("削除失敗: " + err.message); }
        }

        function applyRoleRestrictions() {
            userRole = localStorage.getItem('ekiden_user_role') || 'viewer';
            globalThis.isViewerMode = (userRole === 'viewer');
            if (globalThis.isViewerMode) {
                if(document.getElementById('adminLocationForm')) document.getElementById('adminLocationForm').style.display = 'none';
                if(document.getElementById('navRegister')) document.getElementById('navRegister').style.display = 'none';
            }
        }

        function forceOpenApp() { document.getElementById('loadingScreen').classList.add('hidden'); }
        function openLocationManagerModal() { document.getElementById('locationManagerModal').classList.remove('hidden'); renderLocationManagerList(); }
        function closeLocationManagerModal() { document.getElementById('locationManagerModal').classList.add('hidden'); }

        function switchTab(tab) {
            document.getElementById('pageList').classList.toggle('hidden', tab !== 'list');
            document.getElementById('pageBBS').classList.toggle('hidden', tab !== 'bbs');
            document.getElementById('pageRegister').classList.toggle('hidden', tab !== 'register');
            document.getElementById('navList').className = `flex flex-col items-center text-[9px] font-bold flex-1 ${tab === 'list' ? 'text-accentGreen' : 'text-gray-500'}`;
            document.getElementById('navBBS').className = `flex flex-col items-center text-[9px] font-bold flex-1 ${tab === 'bbs' ? 'text-accentGreen' : 'text-gray-500'}`;
            document.getElementById('navRegister').className = `flex flex-col items-center text-[9px] font-bold flex-1 ${tab === 'register' ? 'text-accentGreen' : 'text-gray-500'}`;
        }

        function updateSelectBoxes() {
            const optionsAll = '<option value="ALL">📍 すべて</option>' + locations.map(loc => `<option value="${loc}">📍 ${loc}</option>`).join('');
            const optionsPure = locations.map(loc => `<option value="${loc}">📍 ${loc}</option>`).join('');
            if (document.getElementById('filterLocation')) document.getElementById('filterLocation').innerHTML = optionsAll;
            if (document.getElementById('addLoc')) document.getElementById('addLoc').innerHTML = optionsPure;
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadEventMenu();
        });
    </script>
</body>
</html>
